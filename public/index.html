<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineScope — Catálogo de Filmes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">▶</span>
        <span class="logo-text">CineScope</span>
      </div>

      <nav class="filter-tabs">
        <button class="tab active" data-endpoint="popular">Populares</button>
        <button class="tab" data-endpoint="top_rated">Mais Bem Avaliados</button>
        <button class="tab" data-endpoint="now_playing">Em Cartaz</button>
        <button class="tab" data-endpoint="upcoming">Em Breve</button>
      </nav>
    </div>
  </header>

  <main>
    <section class="search-section">
      <div class="search-wrapper">
        <span class="search-icon">⌕</span>
        <input id="search" type="text" placeholder="Buscar filme pelo título..." autocomplete="off" />
        <button id="btnSearch">Buscar</button>
        <button id="btnClear" class="btn-clear" title="Limpar busca">✕</button>
      </div>
    </section>

    <p id="message" class="message"></p>

    <div id="movie-list" class="movie-list"></div>
  </main>

  <footer class="site-footer">
    <p>Dados fornecidos por <a href="https://www.themoviedb.org" target="_blank">The Movie Database (TMDB)</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
